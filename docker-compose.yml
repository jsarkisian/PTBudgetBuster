services:
  toolbox:
    build:
      context: .
      dockerfile: Dockerfile.toolbox
    container_name: pt-toolbox
    volumes:
      - scan-data:/opt/pentest/data
      - ./configs:/opt/pentest/configs:ro
    networks:
      - pt-net
    dns:
      - 8.8.8.8
      - 1.1.1.1
    cap_add:
      - NET_RAW
      - NET_ADMIN
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9500/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: pt-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - scan-data:/opt/pentest/data
      - ./backend:/app
      - ./configs:/configs:ro
    environment:
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID:-anthropic.claude-opus-4-6-v1}
      - TOOLBOX_HOST=toolbox
      - TOOLBOX_PORT=9500
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      toolbox:
        condition: service_healthy
    networks:
      - pt-net
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: pt-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - pt-net
    restart: unless-stopped

volumes:
  scan-data:

networks:
  pt-net:
    driver: bridge
